# pii_masker v2 policy — ports business rules from the v3/v4 config.py
#
# This is the authoritative source for all tunables. Do not hardcode thresholds
# anywhere in src/; add a field here and read it via MaskingPolicy.
#
# Version bumps should be semver-like. policy/defaults.yaml ships the in-repo
# defaults; production deployments can override by loading a different YAML.

version: "v4.1.0"
schema_version: 1

# Presidio-style minimum confidence to accept a detection. v3/v4 default was
# 0.60 in MaskingPipeline, so we keep parity.
score_threshold: 0.60

# BRANCH is excluded from the default entity set because internal branch codes
# are rarely sensitive in isolation. Flip this on per-deployment if needed.
mask_branch_code: false

# When true (default), detectors that support checksum/Luhn validation run them.
# Set to false to get parity with the root v3/v4 pipeline which does NOT
# checksum-validate TW ID numbers or credit cards.
strict_validation: false

# --- Conditional AMOUNT masking -------------------------------------------
# AMOUNT is only masked when it appears within N characters of a trigger
# entity (bank account or credit card). Otherwise, "我要領5000元" stays as-is.
conditional_amount:
  trigger_entities:
    - TW_BANK_ACCOUNT
    - TW_CREDIT_CARD
  proximity_chars: 60

# --- High-risk transaction verbs ------------------------------------------
# When one of these verbs appears near a numeric amount, the amount is tagged
# as AMOUNT_TXN (always masked, even without an adjacent account/card).
high_risk_txn_verbs:
  - 轉帳
  - 匯款
  - 扣款
  - 刷卡
  - 付款
  - 繳費
  - 提款
  - 存款
  - 匯入
  - 撥款
  - 退款
  - 退費
  - 交易
  - 扣繳
  - 扣除
  - 入帳
  - 出帳

# --- Diarization fallback --------------------------------------------------
# When speaker labels are missing (or the labeled-ratio is below threshold),
# the pipeline boosts detection scores inside a window after an agent question
# or inside an answer pattern.
diarization_fallback:
  answer_window_chars: 30
  question_boost: 0.15
  answer_boost: 0.10
  diarization_threshold: 0.8
  agent_question_patterns:
    - '請問您的.{0,15}[是為]'
    - '請問您.{0,10}[嗎？?]'
    - '可以.{0,8}嗎'
    - '需要.{0,6}驗證'
    - '確認一下您的'
    - '報一下您的'
    - '幫我.{0,6}確認'
  answer_patterns:
    - '是\s*\d{4,16}'
    - '我的.{0,6}是\s*\d'
    - '對[，。,.]?\s*\d'
    - '^\d{4,16}$'
    - '[\u4e00-\u9fff]{2,4}(?=[，。,.\s]|$)'

