# --- Usability thresholds --------------------------------------------------
usability:
  degraded_masking_threshold: 3.0  # entities per 100 chars
  asr_confidence_threshold: 0.70

# --- Entity priority (higher wins in resolver) ----------------------------
entity_priority:
  TW_CREDIT_CARD: 100
  PERSON: 95
  TW_BANK_ACCOUNT: 90
  TW_PHONE: 88
  TW_ID_NUMBER: 85
  PASSPORT: 83
  EMAIL_ADDRESS: 82
  DOB: 80
  LOCATION: 78
  ORG: 76
  OTP: 75
  LOAN_REF: 72
  EXPIRY: 70
  TXN_REF: 68
  ATM_REF: 66
  PIN: 65
  POLICY_NO: 64
  STAFF_ID: 62
  CVV: 60
  VERIFICATION_ANSWER: 58
  AMOUNT_TXN: 55
  AMOUNT: 50
  CAMPAIGN: 30
  BRANCH: 25

# --- Entity risk level (higher wins in resolver on partial overlap) -------
entity_risk_level:
  TW_CREDIT_CARD: 5
  TW_BANK_ACCOUNT: 5
  TW_ID_NUMBER: 5
  OTP: 5
  CVV: 5
  PIN: 5
  PERSON: 4
  TW_PHONE: 4
  PASSPORT: 4
  EMAIL_ADDRESS: 4
  DOB: 4
  VERIFICATION_ANSWER: 4
  EXPIRY: 4
  AMOUNT_TXN: 3
  AMOUNT: 3
  LOCATION: 3
  LOAN_REF: 3
  ORG: 2
  TXN_REF: 2
  ATM_REF: 2
  POLICY_NO: 2
  STAFF_ID: 2
  CAMPAIGN: 1
  BRANCH: 1

# --- Pseudonym entities (originals listed in MaskingResult.pseudonym_map) -
