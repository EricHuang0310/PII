name: ci

on:
  push:
    branches: [main]
    paths:
      - "pii_masker_v2/**"
  pull_request:
    paths:
      - "pii_masker_v2/**"

defaults:
  run:
    working-directory: pii_masker_v2

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check src tests
          black --check src tests
      - name: Typecheck
        run: mypy src
      - name: Security scan
        run: bandit -q -r src
      - name: Test
        run: |
          pytest \
            --cov=src/pii_masker \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: pii_masker_v2/coverage.xml

  golden-parity:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run golden regression
        run: pytest tests/golden -v

  leak-tripwire:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run leak injection tests
        run: pytest tests/leak -v
